[workspace]
name = "tensorstore-export"
version = "0.1.0"
description = "Convert DVID export-shards Arrow IPC files to neuroglancer precomputed volumes"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10,<3.13"

[pypi-dependencies]
# Core data libraries
numpy = ">=1.24.0"
pyarrow = ">=18.0.0"
zstandard = ">=0.22.0"
tensorstore = ">=0.1.70"

# Cloud / production
google-cloud-storage = ">=2.10.0"
google-cloud-logging = ">=3.8.0"
structlog = ">=23.2.0"
pydantic = ">=2.5.0"
pydantic-settings = ">=2.1.0"
click = ">=8.1.0"
gcsfs = ">=2024.2.0"

# Testing and linting
pytest = ">=8.0"
pytest-cov = ">=4.0"
ruff = ">=0.4.0"

# Install braid as editable from local path
braid = { path = "braid", editable = true }

[tasks]
test-braid = "pytest braid/tests/ -v --no-header --ignore=braid/tests/test_bench_decompressor.py"
test-bench = "pytest braid/tests/test_bench_decompressor.py -v -s --no-header"
test-e2e = "pytest braid/tests/test_e2e_precomputed.py -v --no-header"
test-all = "pytest braid/tests/ -v --no-header"
test-worker = "pytest tests/ -v --no-header"
lint = "ruff check src/ braid/src/ scripts/"
build-braid-c = "make -C braid/csrc"
deploy = "python scripts/deploy.py"
export = "python scripts/export.py"
precompute-manifest = "python scripts/precompute_manifest.py"
export-errors = "python scripts/export_errors.py"
export-status = "python scripts/export_status.py"
compute-offsets = "python scripts/compute_offsets.py"
find-failed = "python scripts/find_failed_shards.py"
profile-shards = "python scripts/profile_shards.py"
launch-profiler = "python scripts/launch_profiler.py"
analyze-memory = "python scripts/analyze_memory.py"
verify-export = "python scripts/verify_export.py"
validate-dvid = "python scripts/validate_dvid_export.py"
create-debug-manifest = "python scripts/create_debug_manifest.py"
remove-empty-shards = "python scripts/remove_empty_shards.py"
