# Ruff linter configuration
# Focus on catching bugs that would otherwise only surface at runtime.

target-version = "py310"

[lint]
# F: Pyflakes — undefined names, unused imports, redefined variables
# E: pycodestyle errors (subset)
# W: pycodestyle warnings (subset)
select = ["F", "E711", "E712", "E721"]

# F401: unused imports — too noisy for __init__.py files
per-file-ignores = {"__init__.py" = ["F401"]}
